version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/node"
    schedule:
      interval: "weekly"
    groups:
      node:
        patterns: ["*"]
    ignore:
      # TypeScript 7 is the new native compiler; the build toolchain
      # (tsup / rollup-plugin-dts) cannot generate .d.ts files with it yet.
      # Revisit once the toolchain supports it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
