name: Publish Python to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC): no API
# token is stored anywhere. Before the first release, register this repo as a
# trusted publisher on PyPI:
#   PyPI > your project (or "pending publisher") > Publishing > add a publisher
#     Owner:        Stef1986
#     Repository:   resultsza-sdk
#     Workflow:     publish-python.yml
#     Environment:  pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build python/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
