name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run so a new Python/Node release that breaks us surfaces on its own.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pinned floor-through-recent, plus a floating canary that may fail.
        python-version: ["3.9", "3.11", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.x"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  node:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
        experimental: [false]
        include:
          - node-version: "latest"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
