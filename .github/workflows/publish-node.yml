name: Publish Node to npm

# Publishes via npm Trusted Publishing (OIDC) - no token is stored anywhere.
#
# One-time setup on npmjs.com (the package must already exist, which it does):
#   npmjs.com > package "resultsza-sdk" > Settings > Trusted Publisher > GitHub Actions
#     Organization or user:  Stef1986
#     Repository:            resultsza-sdk
#     Workflow filename:     publish-node.yml
#     (leave Environment blank)
#
# Trusted Publishing requires npm >= 11.5.1, so the workflow updates npm below.
# Once the first OIDC publish succeeds, delete the NPM_TOKEN secret and revoke
# the token on npm - it is no longer used.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
